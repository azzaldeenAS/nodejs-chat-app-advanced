<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكمال التسجيل</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .container {
            background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;
        }
        h2 { color: #0084ff; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background: #0084ff; color: #fff; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.3s; }
        button:hover { background: #006bce; }
        .error { color: #e74c3c; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>أهلاً بك! 👋</h2>
    <p>يبدو أن هذه هي المرة الأولى لك! يرجى اختيار اسم مستخدم فريد لتعرف به في التطبيق.</p>
    <div id="error-msg" class="error"></div>
    <form id="profile-form">
        <input type="text" id="username" placeholder="اسم المستخدم الفريد (مثال: Ali_99)" required>
        <button type="submit">إكمال التسجيل</button>
    </form>
</div>
<script>
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const errorDiv = document.getElementById('error-msg');
        
        try {
            const res = await fetch('/api/complete-google-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await res.json();
            
            if (data.success) {
                window.location.href = '/';
            } else {
                errorDiv.innerText = data.error;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.innerText = 'حدث خطأ في الاتصال';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
